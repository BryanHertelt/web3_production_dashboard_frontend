name: Deployment Web

on: workflow_dispatch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs: 
  # ---------------------------
  # Generate version label
  # ---------------------------
  version:
    name: Generate version label
    runs-on: ${{vars.RUNNER_TYPE}}
    outputs:
        version-tag: ${{ steps.label.outputs.tag }}
    timeout-minutes: 10 
    permissions: 
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  
      - name: Label Images
        id: label
        uses: ZenetOfficial/infra/github/label-images@ZEN-106/create-actions-for-deployment  # TODO: Change to @main for production
  # ---------------------------
  # Build and push image
  # ---------------------------
  docker-build:
    name: Build and push docker image
    runs-on: ${{vars.RUNNER_TYPE}}
    needs: "version"
    permissions: 
      contents: read 
      packages: write
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/zenetofficial/web-frontend
          tags: |
            type=raw,value=${{ needs.version.outputs.version-tag }}
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web-frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/zenetofficial/web-frontend:cache
            type=registry,ref=ghcr.io/zenetofficial/web-frontend:latest
          cache-to: |
            type=inline
            type=registry,ref=ghcr.io/zenetofficial/web-frontend:cache,mode=max
          build-args: |
            CI_COMMIT_SHA=${{ github.sha }}
            CI_COMMIT_REF_NAME=${{ github.ref_name }}
  # ---------------------------
  # Scan image for vulnerabilities
  # ---------------------------
  image-scan-job:
    name: Scan docker image
    runs-on: ${{vars.RUNNER_TYPE}}
    timeout-minutes: 15
    needs: ["version", "docker-build"]
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_REF: ghcr.io/zenetofficial/web-frontend:${{ needs.version.outputs.version-tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy Scan (All Formats)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{env.IMAGE_REF}}
          format: json
          output: trivy-image.json
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Generate Additional Reports
        run: |
          trivy image --format table --ignore-unfixed \
            --severity HIGH,CRITICAL "${{ env.IMAGE_REF }}" > trivy-report.txt
          trivy image --format cyclonedx \
            --ignore-unfixed "${{ env.IMAGE_REF }}" -o sbom.cdx.json

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-reports
          path: |
            trivy-report.txt
            trivy-image.json
            sbom.cdx.json
          retention-days: 7
# ---------------------------
# Deploy image to dev server
# ---------------------------
  deploy:
    name: Deploy image to dev server
    runs-on: ${{vars.RUNNER_TYPE}}
    needs: ["version", "image-scan-job"]
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Deploy application
        uses: ZenetOfficial/infra/github/deploy@ZEN-106/create-actions-for-deployment  # TODO: Change to @main for production
        with:
          tag: ${{ needs.version.outputs.version-tag }}
          ssh-key: ${{secrets.DEV_DEPLOY_SSH_KEY}}
          ssh-known-hosts: ${{secrets.DEV_SSH_KNOWN_HOSTS}}
          deploy-host: ${{vars.DEV_SERVER_HOST}}
          deploy-user: ${{vars.DEV_SERVER_USER}}
          deploy-path: ${{vars.DEV_SERVER_PATH}}
          deploy-port: ${{vars.DEV_SERVER_SSH_PORT}}
          postgres-password: ${{secrets.DEV_POSTGRES_PASSWORD}}
          grafana-password: ${{secrets.DEV_GRAFANA_PASSWORD}}
          nginx-user: ${{secrets.DEV_NGINX_USER}}
          nginx-password: ${{secrets.DEV_NGINX_PASSWORD}}
          compose-file: 'docker-compose.yml'
        