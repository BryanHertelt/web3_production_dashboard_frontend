name: CI/CD Pipeline Web

on:
  pull_request:
    branches: ['**']
  push:
    branches:
      - dev
      - pipeline-testing

env:
  NODE_OPTIONS: "--max-old-space-size=2048"
  DOCKER_IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  # ---------------------------
  # Install dependencies
  # ---------------------------
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            web-frontend/.npm/
            web-frontend/.next/cache/
            web-frontend/node_modules/
          key: ${{ runner.os }}-npm-${{ hashFiles('web-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: web-frontend
        run: npm ci --cache .npm --prefer-offline

  # ---------------------------
  # TypeScript type checking
  # ---------------------------
  typescript-check:
    name: TypeScript type checking
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            web-frontend/.npm/
            web-frontend/node_modules/
          key: ${{ runner.os }}-npm-${{ hashFiles('web-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Run TypeScript check
        working-directory: web-frontend
        run: npx tsc --noEmit

  # ---------------------------
  # ESLint code quality check
  # ---------------------------
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            web-frontend/.npm/
            web-frontend/node_modules/
          key: ${{ runner.os }}-npm-${{ hashFiles('web-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Run ESLint
        working-directory: web-frontend
        run: npm run lint

      - name: Upload code quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codequality-report
          path: web-frontend/gl-codequality.json
          retention-days: 5
        continue-on-error: true

  # ---------------------------
  # Auto-format code and commit changes
  # ---------------------------
  prettier-format:
    name: Prettier auto-format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push'
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            web-frontend/.npm/
            web-frontend/node_modules/
          key: ${{ runner.os }}-npm-${{ hashFiles('web-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Configure Git
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

      - name: Run Prettier format
        working-directory: web-frontend
        run: npm run format:write || true

      - name: Check for changes and commit
        run: |
          if ! git diff --quiet; then
            echo "Changes detected, committing and pushing to ${{ github.ref_name }}..."
            git add .
            git commit -m "style: Auto-format code with Prettier

          Co-Authored-By: GitHub Actions <actions@github.com>"
            git push origin HEAD:${{ github.ref_name }}
            echo "Code formatted and committed successfully"
          else
            echo "No changes detected, skipping commit and push."
          fi

  # ---------------------------
  # Run Jest tests with coverage
  # ---------------------------
  test-jest:
    name: Jest tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            web-frontend/.npm/
            web-frontend/node_modules/
          key: ${{ runner.os }}-npm-${{ hashFiles('web-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Run Jest tests
        working-directory: web-frontend
        run: npm run test -- --ci --watchAll=false --passWithNoTests

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            web-frontend/coverage/
          retention-days: 5

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: web-frontend/coverage/junit.xml
          retention-days: 5
        continue-on-error: true

  # ---------------------------
  # Build Docker image
  # ---------------------------
  docker-build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/pipeline-testing')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web-frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}:cache
            type=registry,ref=ghcr.io/${{ github.repository }}:latest
          cache-to: type=inline
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            CI_COMMIT_SHA=${{ github.sha }}
            CI_COMMIT_REF_NAME=${{ github.ref_name }}

  # ---------------------------
  # Scan code base for secrets
  # ---------------------------
  security-secrets:
    name: Gitleaks secret scanning
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

  # ---------------------------
  # Semgrep SAST scanning
  # ---------------------------
  semgrep-scan:
    name: Semgrep security scanning
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep scan
        working-directory: web-frontend
        run: |
          echo "Running Semgrep security scanner on JavaScript/TypeScript files..."
          semgrep --config=auto --config=p/security-audit --config=p/owasp-top-ten --config=p/react src/ --exclude="*/__test__/*" --exclude="*/tests/*" --exclude="*.test.*" --json --output semgrep-report.json || true

      - name: Evaluate security results
        working-directory: web-frontend
        run: |
          python3 -c "
          import json
          import sys

          total_issues = 0
          critical_issues = []

          # Check Semgrep results
          try:
              with open('semgrep-report.json', 'r') as f:
                  semgrep_data = json.load(f)

              semgrep_results = semgrep_data.get('results', [])
              semgrep_critical = [r for r in semgrep_results if r.get('extra', {}).get('severity') == 'ERROR']
              semgrep_warnings = [r for r in semgrep_results if r.get('extra', {}).get('severity') == 'WARNING']
              total_issues += len(semgrep_results)
              critical_issues.extend(semgrep_critical)

              print(f'Semgrep: {len(semgrep_results)} total issues found')
              print(f'  - {len(semgrep_critical)} critical (ERROR)')
              print(f'  - {len(semgrep_warnings)} warnings (WARNING)')
              print(f'  - {len(semgrep_results) - len(semgrep_critical) - len(semgrep_warnings)} info/other')

              if semgrep_critical:
                  print()
                  print('=== Critical Security Issues (ERROR) ===')
                  for issue in semgrep_critical:
                      extra = issue.get('extra', {})
                      print(f'  🔴 [{extra.get(\"severity\", \"ERROR\")}] {extra.get(\"message\", \"\")}')
                      print(f'     Rule: {issue.get(\"check_id\", \"\")}')
                      print(f'     File: {issue.get(\"path\", \"\")}:{issue.get(\"start\", {}).get(\"line\", \"\")}')
                      if extra.get('references'):
                          print(f'     References: {extra.get(\"references\", [])}')
                      print()

              if semgrep_warnings:
                  print('=== Security Warnings (WARNING) ===')
                  for issue in semgrep_warnings[:5]:  # Show first 5 warnings
                      extra = issue.get('extra', {})
                      print(f'  🟡 [{extra.get(\"severity\", \"WARNING\")}] {extra.get(\"message\", \"\")}')
                      print(f'     Rule: {issue.get(\"check_id\", \"\")}')
                      print(f'     File: {issue.get(\"path\", \"\")}:{issue.get(\"start\", {}).get(\"line\", \"\")}')
                  if len(semgrep_warnings) > 5:
                      print(f'  ... and {len(semgrep_warnings) - 5} more warnings')
                  print()

          except Exception as e:
              print(f'Semgrep parsing error: {e}')
              sys.exit(1)

          print(f'Total security issues found: {total_issues}')
          print(f'Critical issues requiring immediate attention: {len(critical_issues)}')

          if critical_issues:
              print('❌ Pipeline failing due to critical security issues')
              sys.exit(1)
          else:
              print('✅ No critical security issues found')
          "

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: web-frontend/semgrep-report.json
          retention-days: 7

  # ---------------------------
  # Trivy security scanning
  # ---------------------------
  trivy-scan:
    name: Trivy container scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/pipeline-testing')
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: .cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: |
            trivy-db-

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          format: 'json'
          output: 'trivy-report.json'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          scanners: 'vuln,secret'
        env:
          TRIVY_CACHE_DIR: .cache/trivy

      - name: Run Trivy scan (table format)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          format: 'table'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
          scanners: 'vuln,secret'
          exit-code: '1'
        env:
          TRIVY_CACHE_DIR: .cache/trivy

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 5

  # ---------------------------
  # Security audit
  # ---------------------------
  security-audit:
    name: npm security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: install
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            web-frontend/.npm/
            web-frontend/node_modules/
          key: ${{ runner.os }}-npm-${{ hashFiles('web-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Run npm audit
        working-directory: web-frontend
        run: npm audit --audit-level=moderate

  # ---------------------------
  # Generate and store documentation
  # ---------------------------
  generate-docs:
    name: Generate documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: (github.ref == 'refs/heads/dev' && github.event_name == 'push') || github.event_name == 'pull_request'
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            web-frontend/.npm/
            web-frontend/node_modules/
          key: ${{ runner.os }}-npm-${{ hashFiles('web-frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Generate documentation
        working-directory: web-frontend
        run: npm run docs

      - name: Prepare documentation artifact
        run: |
          mkdir -p public
          cp -r web-frontend/docs/* public/

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: public/
          retention-days: 30
