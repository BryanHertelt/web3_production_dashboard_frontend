image: node:20-slim

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # Run on MR creation/update
    - if: $CI_COMMIT_BRANCH == 'dev' && $CI_PIPELINE_SOURCE == 'push' # Run after merge to dev
    - if: $CI_COMMIT_BRANCH == 'main' && $CI_PIPELINE_SOURCE == 'push' # Run after merge to main
    - if: $CI_COMMIT_BRANCH == 'pipeline-testing' && $CI_PIPELINE_SOURCE == 'push' # Run on pipeline-testing branch
    - when: never # Exclude all other cases (feature branch pushes, etc.)

stages:
  - install
  - lint
  - test
  - build
  - security
  - deploy

variables:
  NODE_OPTIONS: "--max-old-space-size=2048"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/web-frontend/.npm"
  CYPRESS_CACHE_FOLDER: "$CI_PROJECT_DIR/web-frontend/cache/Cypress"

cache:
  key:
    files:
      - web-frontend/package-lock.json
  paths:
    - web-frontend/.npm/
    - web-frontend/.next/cache/
  policy: pull-push

# ---------------------------
# Install dependencies
# ---------------------------
install_dependencies:
  stage: install
  script:
    - cd web-frontend
    - npm ci --cache .npm --prefer-offline
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
  artifacts:
    paths:
      - web-frontend/node_modules/
    expire_in: 20 minutes
  timeout: 10m
  rules:
    - if: $CI_COMMIT_BRANCH == "pipeline-testing"
      when: always
    - when: manual

# ---------------------------
# TypeScript type checking
# ---------------------------
typescript_check:
  stage: lint
  script:
    - cd web-frontend
    - npx tsc --noEmit
  needs:
    - job: install_dependencies
      artifacts: true
  timeout: 3m
  rules:
    - if: $CI_COMMIT_BRANCH == "pipeline-testing"
      when: always
    - when: manual

# ---------------------------
# ESLint code quality check
# ---------------------------
eslint:
  stage: lint
  script:
    - cd web-frontend
    - npm run lint
  needs:
    - job: install_dependencies
      artifacts: true
  artifacts:
    reports:
      codequality: web-frontend/gl-codequality.json
    when: always
    expire_in: 3 days
  timeout: 3m
  rules:
    - if: $CI_COMMIT_BRANCH == "pipeline-testing"
      when: always
    - when: manual

# ---------------------------
# Run Jest tests with coverage
# ---------------------------
test_jest:
  stage: test
  script:
    - cd web-frontend
    - npm run test -- --ci --watchAll=false --passWithNoTests
  needs:
    - job: install_dependencies
      artifacts: true
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: web-frontend/coverage/cobertura-coverage.xml
      junit: web-frontend/coverage/junit.xml
    paths:
      - web-frontend/coverage/
    when: always
    expire_in: 3 days
  timeout: 8m
  rules:
    - if: $CI_COMMIT_BRANCH == "pipeline-testing"
      when: always
    - when: manual

# ---------------------------
# Build the Next.js application
# ---------------------------
build_app:
  stage: build
  script:
    - cd web-frontend
    - npm run build
  needs:
    - job: install_dependencies
      artifacts: true
  artifacts:
    paths:
      - web-frontend/.next/standalone/
      - web-frontend/.next/static/
      - web-frontend/public/
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_BRANCH == "pipeline-testing"
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev")'
      when: manual
    - when: manual
  timeout: 15m

# ---------------------------
# Scan build output for secrets
# ---------------------------
scan_build_secrets:
  stage: security
  image: python:3.11-alpine
  script:
    - pip install detect-secrets
    - "detect-secrets scan web-frontend/.next/ > detect_secrets_report.json || true"
    - 'if [ -s detect_secrets_report.json ]; then echo "Secrets detected in build output!" && exit 1; fi'
  needs:
    - job: build_app
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "pipeline-testing"
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev")'
      when: manual
    - when: manual
  timeout: 3m

# ---------------------------
# Security audit
# ---------------------------
security_audit:
  stage: security
  script:
    - cd web-frontend
    - npm audit --audit-level=moderate
  needs:
    - job: install_dependencies
      artifacts: false
  allow_failure: true
  timeout: 5m
  rules:
    - if: $CI_COMMIT_BRANCH == "pipeline-testing"
      when: always
    - when: manual

# ---------------------------
# Generate and deploy documentation to GitLab Pages
# ---------------------------
pages:
  stage: deploy
  script:
    - npm run docs
    - mkdir public
    - cp -r docs/* public/
  needs:
    - install_dependencies
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - when: never
  timeout: 10m

# ---------------------------
# Generate and deploy documentation to GitLab Pages
# ---------------------------
pages:
  stage: deploy
  script:
    - cd web-frontend
    - npm run docs
    - cd ..
    - mkdir public
    - cp -r web-frontend/docs/* public/
  needs:
    - install_dependencies
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - when: never
  timeout: 10m

# ---------------------------
# Clean up cache periodically
# ---------------------------
cleanup_cache:
  stage: install
  script:
    - echo "Cleaning up old cache files..."
    - find web-frontend/.npm -type f -mtime +7 -delete 2>/dev/null || true
    - find web-frontend/.next/cache -type f -mtime +7 -delete 2>/dev/null || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
    - when: never
