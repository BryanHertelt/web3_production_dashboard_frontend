image: node:20-slim

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # Run on MR creation/update
    - if: $CI_COMMIT_BRANCH == 'dev' && $CI_PIPELINE_SOURCE == 'push' # Run after merge to dev
    - if: $CI_COMMIT_BRANCH == 'pipeline-testing' && $CI_PIPELINE_SOURCE == 'push' # Run on pipeline-testing branch

stages:
  - install
  - lint
  - test
  - build
  - build_docker
  - lighthouse
  - security
  - docs

variables:
  NODE_OPTIONS: "--max-old-space-size=2048"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/web-frontend/.npm"
  CYPRESS_CACHE_FOLDER: "$CI_PROJECT_DIR/web-frontend/cache/Cypress"
  DOCKER_IMAGE_NAME: "$CI_PROJECT_NAME"
  DOCKER_IMAGE_TAG: "$CI_COMMIT_SHA"

cache:
  key:
    files:
      - web-frontend/package-lock.json
  paths:
    - web-frontend/.npm/
    - web-frontend/.next/cache/
    - web-frontend/node_modules/
  policy: pull-push

# ---------------------------
# Install dependencies
# ---------------------------
install_dependencies:
  stage: install
  script:
    - cd web-frontend
    - npm ci --cache .npm --prefer-offline
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull-push
  timeout: 10m

# ---------------------------
# TypeScript type checking
# ---------------------------
typescript_check:
  stage: lint
  script:
    - cd web-frontend
    - npx tsc --noEmit
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  needs:
    - install_dependencies
  timeout: 3m

# ---------------------------
# ESLint code quality check
# ---------------------------
eslint:
  stage: lint
  script:
    - cd web-frontend
    - npm run lint
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  needs:
    - install_dependencies
  artifacts:
    reports:
      codequality: web-frontend/gl-codequality.json
    when: always
    expire_in: 5 days
  timeout: 3m

# ---------------------------
# Run Jest tests with coverage
# ---------------------------
test_jest:
  stage: test
  script:
    - cd web-frontend
    - npm run test -- --ci --watchAll=false --passWithNoTests
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  needs:
    - install_dependencies
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: web-frontend/coverage/cobertura-coverage.xml
      junit: web-frontend/coverage/junit.xml
  timeout: 8m

# ---------------------------
# Auto-format code and commit changes
# ---------------------------
prettier_format:
  stage: lint
  image: node:20-bullseye-slim
  before_script:
    - apt-get update || apt-get update --allow-releaseinfo-change
    - apt-get install -y --no-install-recommends ca-certificates gnupg git
    - rm -rf /var/lib/apt/lists/*
    - git --version
    # Configure Git
    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab.com"
    # Set HTTPS URL with PAT for authentication
    - git remote set-url origin "https://oauth2:${ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      # Fetch and checkout the correct branch
    - git fetch origin "${CI_COMMIT_REF_NAME}:${CI_COMMIT_REF_NAME}"
    - git checkout "${CI_COMMIT_REF_NAME}"
    # Debug: Verify remote and branch
    - git branch
  script:
    - cd web-frontend
    # Run prettier format, allowing failures
    - npm run format:write
    # Check for changes and push to remote
    - |
      if ! git diff --quiet .; then
        echo "Changes detected, committing and pushing to ${CI_COMMIT_REF_NAME}..."
        git add .
        git commit -m "style: Auto-format code with Prettier.

        Co-Authored-By: GitLab CI <ci@gitlab.com>"
        git push origin HEAD:${CI_COMMIT_REF_NAME} -o ci.skip
        echo "Code formatted and committed successfully"
      else
        echo "No changes detected, skipping commit and push."
      fi
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  timeout: 5m

# ---------------------------
# Build Docker images
# ---------------------------
docker_build:
  stage: build_docker
  image: docker:26
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_BUILDKIT: "1"
    BUILDKIT_PROGRESS: plain
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin
  script:
    # Build Mockoon mock API image
    - cd web-frontend/mock_api
    - echo "Building Mockoon Docker image..."
    - |
      docker build \
        -t "$CI_REGISTRY_IMAGE/mock-api:$CI_COMMIT_SHA" \
        -t "$CI_REGISTRY_IMAGE/mock-api:latest" \
        .
    - echo "Pushing Mockoon images to registry..."
    - docker push "$CI_REGISTRY_IMAGE/mock-api:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/mock-api:latest"

    # Build web application image
    - cd ..
    - echo "Building web application Docker image with BuildKit and layer caching..."
    - docker pull "$CI_REGISTRY_IMAGE:latest" || true 
    - |
      docker build \
        --cache-from "$CI_REGISTRY_IMAGE:latest" \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --build-arg NEXT_PUBLIC_API_URL=http://localhost:3001 \
        --build-arg CI_COMMIT_SHA="$CI_COMMIT_SHA" \
        --build-arg CI_COMMIT_REF_NAME="$CI_COMMIT_REF_NAME" \
        -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" \
        -t "$CI_REGISTRY_IMAGE:latest" \
        .
    - echo "Pushing web application images to registry..."
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"

    # Clean up
    - echo "Removing docker images from runner..."
    - docker rmi "$CI_REGISTRY_IMAGE/mock-api:$CI_COMMIT_SHA" || true
    - docker rmi "$CI_REGISTRY_IMAGE/mock-api:latest" || true
    - docker rmi "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "pipeline-testing"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  timeout: 20m

# ---------------------------
# Lighthouse Performance Audit
# ---------------------------
lighthouse_audit:
  stage: lighthouse
  image: docker:26
  needs:
    - ["docker_build"]
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_BUILDKIT: "1"
  before_script:
    - apk add --no-cache docker-compose
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin
  script:
    - docker pull "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker pull "$CI_REGISTRY_IMAGE/mock-api:$CI_COMMIT_SHA"

    - docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" web-app:latest
    - docker tag "$CI_REGISTRY_IMAGE/mock-api:$CI_COMMIT_SHA" mock-api:latest

    - docker-compose build lighthouse

    - docker-compose --profile lighthouse up --exit-code-from lighthouse || true

    # Copy reports from stopped container to host for GitLab artifacts
    - mkdir -p ./web-frontend/lighthouse-reports
    - docker cp lighthouse:/workspace/web-frontend/lighthouse-reports/. ./web-frontend/lighthouse-reports/ || echo "No reports to copy"

  after_script:
    - docker-compose --profile lighthouse down -v || true
  artifacts:
    paths:
      - web-frontend/lighthouse-reports/
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "pipeline-testing"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  timeout: 15m


# ---------------------------
# Scan code base for secrets
# ---------------------------
security_secrets:
  stage: security
  image: alpine:latest
  timeout: 8 minutes
  needs: ["install_dependencies"]
  before_script:
    - apk add --no-cache curl git
    - curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz
    - mv gitleaks /usr/local/bin/
  script:
    - echo "Scanning for secrets with gitleaks..."
    - gitleaks detect --source . --config .gitleaks.toml --report-format json --report-path gitleaks-report.json || true
    - |
      if grep -q '"Secret":' gitleaks-report.json 2>/dev/null; then
        echo "❌ Pipeline failing due to secrets detected"
        echo "=== Secrets Found ==="
        cat gitleaks-report.json
        exit 1
      else
        echo "✅ No secrets detected"
      fi
  artifacts:
    paths:
      - "gitleaks-report.json"
    when: always
    expire_in: 1 week

# ---------------------------
# Trivy security scanning
# ---------------------------
trivy_scan:
  stage: security
  needs:
    - "docker_build"
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  before_script: []
  variables:
    WEB_APP: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    MOCK_API: $CI_REGISTRY_IMAGE/mock-api:$CI_COMMIT_SHA"
    TRIVY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/trivy"
  cache:
    key: trivy-db
    policy: pull-push
    paths: [".cache/trivy"]
  script:
    # 1) auth to GitLab Container Registry
    - echo "$CI_REGISTRY_PASSWORD" | trivy registry login --username "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - echo "Scan web_app"
    - trivy image --image-src=remote --scanners vuln,secret --severity HIGH,CRITICAL --ignore-unfixed --format table --exit-code 1 "$WEB_APP" 
    - echo "Scan mock_api"
    - trivy image --image-src=remote --scanners vuln,secret --severity HIGH,CRITICAL --ignore-unfixed --format table --exit-code 1 "$MOCK_API"
    - echo "Build reports for web_app and mock_api"
    - trivy image --image-src=remote --format json -o trivy-web-image-report.json "$WEB_APP" || true
    - trivy image --image-src=remote --format json -o trivy-mock-api-report.json "$MOCK_API" || true
  artifacts:
    reports:
      container_scanning: trivy-web-image-report.json
    paths:
      - trivy-web-image-report.json
      - trivy-mock-api-report.json
    when: always
    expire_in: 5 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "pipeline-testing"'
  timeout: 10m

# ---------------------------
# Security audit
# ---------------------------
security_audit:
  stage: security
  script:
    - cd web-frontend
    - npm audit --audit-level=moderate
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  needs:
    - install_dependencies
  timeout: 5m

# ---------------------------
# Semgrep security scanning
# ---------------------------
semgrep_scan:
  stage: security
  image: python:3.11-slim
  timeout: 8 minutes
  needs: ["install_dependencies"]
  cache:
    key: ${CI_PROJECT_ID}-pip-cache
    paths:
      - .cache/pip/
    policy: pull-push
  before_script:
    - pip install semgrep
    - apt-get update && apt-get install -y git
  script:
    - echo "Running Semgrep security scanner on JavaScript/TypeScript files..."
    - cd web-frontend
    - semgrep --config=auto --config=p/security-audit --config=p/owasp-top-ten --config=p/react src/ --exclude="*/__test__/*" --exclude="*/tests/*" --exclude="*.test.*" --json --output semgrep-report.json || true

    # Security evaluation with detailed output
    - |
      python3 -c "
      import json
      import sys

      total_issues = 0
      critical_issues = []

      # Check Semgrep results
      try:
          with open('semgrep-report.json', 'r') as f:
              semgrep_data = json.load(f)
          
          semgrep_results = semgrep_data.get('results', [])
          semgrep_critical = [r for r in semgrep_results if r.get('extra', {}).get('severity') == 'ERROR']
          semgrep_warnings = [r for r in semgrep_results if r.get('extra', {}).get('severity') == 'WARNING']
          total_issues += len(semgrep_results)
          critical_issues.extend(semgrep_critical)
          
          print(f'Semgrep: {len(semgrep_results)} total issues found')
          print(f'  - {len(semgrep_critical)} critical (ERROR)')
          print(f'  - {len(semgrep_warnings)} warnings (WARNING)')
          print(f'  - {len(semgrep_results) - len(semgrep_critical) - len(semgrep_warnings)} info/other')
          
          if semgrep_critical:
              print()
              print('=== Critical Security Issues (ERROR) ===')
              for issue in semgrep_critical:
                  extra = issue.get('extra', {})
                  print(f'  🔴 [{extra.get(\"severity\", \"ERROR\")}] {extra.get(\"message\", \"\")}')
                  print(f'     Rule: {issue.get(\"check_id\", \"\")}')
                  print(f'     File: {issue.get(\"path\", \"\")}:{issue.get(\"start\", {}).get(\"line\", \"\")}')
                  if extra.get('references'):
                      print(f'     References: {extra.get(\"references\", [])}')
                  print()
          
          if semgrep_warnings:
              print('=== Security Warnings (WARNING) ===')
              for issue in semgrep_warnings[:5]:  # Show first 5 warnings
                  extra = issue.get('extra', {})
                  print(f'  🟡 [{extra.get(\"severity\", \"WARNING\")}] {extra.get(\"message\", \"\")}')
                  print(f'     Rule: {issue.get(\"check_id\", \"\")}')
                  print(f'     File: {issue.get(\"path\", \"\")}:{issue.get(\"start\", {}).get(\"line\", \"\")}')
              if len(semgrep_warnings) > 5:
                  print(f'  ... and {len(semgrep_warnings) - 5} more warnings')
              print()
              
      except Exception as e:
          print(f'Semgrep parsing error: {e}')
          sys.exit(1)

      print(f'Total security issues found: {total_issues}')
      print(f'Critical issues requiring immediate attention: {len(critical_issues)}')

      if critical_issues:
          print('❌ Pipeline failing due to critical security issues')
          sys.exit(1)
      else:
          print('✅ No critical security issues found')
      "
  artifacts:
    reports:
      sast: web-frontend/semgrep-report.json
    paths:
      - web-frontend/semgrep-report.json
    when: always
    expire_in: 1 week

# ---------------------------
# Generate and deploy documentation to GitLab Pages
# ---------------------------
build_docs:
  stage: docs
  pages: true
  script:
    - cd web-frontend
    - npm run docs
    - cd ..
    - mkdir public
    - cp -r web-frontend/docs/* public/
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  needs:
    - install_dependencies
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: $CI_COMMIT_BRANCH == 'pipeline-testing' && $CI_PIPELINE_SOURCE == 'push'
  timeout: 10m

# ---------------------------
# Clean up cache periodically
# ---------------------------
cleanup_cache:
  stage: install
  script:
    - echo "Cleaning up old cache files..."
    - find web-frontend/.npm -type f -mtime +7 -delete 2>/dev/null || true
    - find web-frontend/.next/cache -type f -mtime +7 -delete 2>/dev/null || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
    - when: never
