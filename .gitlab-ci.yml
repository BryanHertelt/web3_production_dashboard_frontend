image: node:20-slim

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # Run on MR creation/update
    - if: $CI_COMMIT_BRANCH == 'dev' && $CI_PIPELINE_SOURCE == 'push' # Run after merge to dev
    - if: $CI_COMMIT_BRANCH == 'pipeline-testing' && $CI_PIPELINE_SOURCE == 'push' # Run on pipeline-testing branch
    - when: never # Exclude all other cases (feature branch pushes, etc.)

stages:
  - install
  - lint
  - test
  - build
  - docker-build
  - security
  - deploy

variables:
  NODE_OPTIONS: "--max-old-space-size=2048"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/web-frontend/.npm"
  CYPRESS_CACHE_FOLDER: "$CI_PROJECT_DIR/web-frontend/cache/Cypress"
  DOCKER_IMAGE_NAME: "$CI_PROJECT_NAME"
  DOCKER_IMAGE_TAG: "$CI_COMMIT_SHA"

cache:
  key:
    files:
      - web-frontend/package-lock.json
  paths:
    - web-frontend/.npm/
    - web-frontend/.next/cache/
    - web-frontend/node_modules/
  policy: pull-push

# ---------------------------
# Install dependencies
# ---------------------------
install_dependencies:
  stage: install
  script:
    - cd web-frontend
    - npm ci --cache .npm --prefer-offline
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull-push
  timeout: 10m

# ---------------------------
# TypeScript type checking
# ---------------------------
typescript_check:
  stage: lint
  script:
    - cd web-frontend
    - npx tsc --noEmit
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  needs:
    - job: install_dependencies
      artifacts: false
  timeout: 3m

# ---------------------------
# ESLint code quality check
# ---------------------------
eslint:
  stage: lint
  script:
    - cd web-frontend
    - npm run lint
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  needs:
    - job: install_dependencies
      artifacts: false
  artifacts:
    reports:
      codequality: web-frontend/gl-codequality.json
    when: always
    expire_in: 5 days
  timeout: 3m

# ---------------------------
# Prettier formatting check
# ---------------------------
prettier_check:
  stage: lint
  script:
    - cd web-frontend
    - npm run format:check
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  needs:
    - job: install_dependencies
      artifacts: false
  allow_failure: true
  timeout: 3m

# ---------------------------
# Run Jest tests with coverage
# ---------------------------
test_jest:
  stage: test
  script:
    - cd web-frontend
    - npm run test -- --ci --watchAll=false --passWithNoTests
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  needs:
    - job: install_dependencies
      artifacts: false
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: web-frontend/coverage/cobertura-coverage.xml
      junit: web-frontend/coverage/junit.xml
    paths:
      - web-frontend/coverage/
    when: always
    expire_in: 5 days
  timeout: 8m

# ---------------------------
# Auto-format code and commit changes
# ---------------------------
prettier_format:
  stage: lint
  needs:
    - prettier_check
  script:
    - cd web-frontend
    - npm run format:write
    - |
      if [ -n "$(git status --porcelain)" ]; then
        git config user.name "Pipeline"
        git config user.email "pipelineweb@gitlab.com"
        git add .
        git commit -m "style: Auto-format code with Prettier.

        Co-Authored-By: GitLab CI <ci@gitlab.com>"
        git push https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git HEAD:${CI_COMMIT_REF_NAME}
        echo "Code formatted and committed successfully"
      else
        echo "No formatting changes needed"
      fi
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  timeout: 5m


# ---------------------------
# Build Docker image
# ---------------------------
docker_build:
  stage: docker-build
  image: docker:26
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin
  script:
    - cd web-frontend
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "pipeline-testing"'
      when: always
    - when: never
  timeout: 20m


# ---------------------------
# Scan code base for secrets
# ---------------------------
scan_build_secrets:
  stage: security
  image: python:3.11-alpine
  script:
    - pip install detect-secrets
    - cd web-frontend
    - "detect-secrets scan --all-files . > ../detect_secrets_report.json || true"
    - cd ..
    - 'if [ -s detect_secrets_report.json ]; then echo "Secrets detected in source code!" && exit 1; fi'
  needs:
    - job: install_dependencies
      artifacts: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "dev")'
      when: always
    - when: never
  timeout: 3m

# ---------------------------
# Trivy security scanning
# ---------------------------
trivy_scan:
  stage: security
  needs: ["docker_build"]
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  before_script: []
  variables:
    IMAGE_REF: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    TRIVY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/trivy"
  cache:
    key: trivy-db
    policy: pull-push
    paths: [".cache/trivy"]
  script:
    # 1) auth to GitLab Container Registry
    - echo "$CI_REGISTRY_PASSWORD" | trivy registry login --username "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    # 2) scan the pushed image via remote registry (no docker daemon)
    - trivy image --image-src=remote --scanners vuln,secret --severity HIGH,CRITICAL --ignore-unfixed --format table --exit-code 1 "$IMAGE_REF"
    # 3) export reports (non-fatal)
    - trivy image --image-src=remote --format json -o trivy-report.json "$IMAGE_REF" || true
  artifacts:
    reports:
      container_scanning: trivy-report.json
    paths:
      - trivy-report.json
    when: always
    expire_in: 5 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "pipeline-testing"'
      when: always
    - when: never
  timeout: 10m

# ---------------------------
# Security audit
# ---------------------------
security_audit:
  stage: security
  script:
    - cd web-frontend
    - npm audit --audit-level=moderate
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  needs:
    - job: install_dependencies
      artifacts: false
  allow_failure: true
  timeout: 5m

# ---------------------------
# Generate and deploy documentation to GitLab Pages
# ---------------------------
pages:
  stage: deploy
  script:
    - cd web-frontend
    - npm run docs
    - cd ..
    - mkdir public
    - cp -r web-frontend/docs/* public/
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
      - web-frontend/node_modules/
    policy: pull
  needs:
    - job: install_dependencies
      artifacts: false
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - when: never
  timeout: 10m

# ---------------------------
# Clean up cache periodically
# ---------------------------
cleanup_cache:
  stage: install
  script:
    - echo "Cleaning up old cache files..."
    - find web-frontend/.npm -type f -mtime +7 -delete 2>/dev/null || true
    - find web-frontend/.next/cache -type f -mtime +7 -delete 2>/dev/null || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
    - when: never
