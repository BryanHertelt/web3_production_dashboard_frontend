image: node:20-slim

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event' # Run on MR creation/update
    - if: $CI_COMMIT_BRANCH == 'dev' && $CI_PIPELINE_SOURCE == 'push' # Run after merge to dev
    - if: $CI_COMMIT_BRANCH == 'main' && $CI_PIPELINE_SOURCE == 'push' # Run after merge to main
    - if: $CI_COMMIT_BRANCH == 'pipeline-testing' && $CI_PIPELINE_SOURCE == 'push' # Run on pipeline-testing branch
    - when: never # Exclude all other cases (feature branch pushes, etc.)

stages:
  - install
  - lint
  - test
  - build
  - docker-build
  - security
  - deploy

variables:
  NODE_OPTIONS: "--max-old-space-size=2048"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/web-frontend/.npm"
  CYPRESS_CACHE_FOLDER: "$CI_PROJECT_DIR/web-frontend/cache/Cypress"
  DOCKER_IMAGE_NAME: "$CI_PROJECT_NAME"
  DOCKER_IMAGE_TAG: "$CI_COMMIT_SHA"

cache:
  key:
    files:
      - web-frontend/package-lock.json
  paths:
    - web-frontend/.npm/
    - web-frontend/.next/cache/
  policy: pull-push

# ---------------------------
# Install dependencies
# ---------------------------
install_dependencies:
  stage: install
  script:
    - cd web-frontend
    - npm ci --cache .npm --prefer-offline
  cache:
    key:
      files:
        - web-frontend/package-lock.json
    paths:
      - web-frontend/.npm/
  artifacts:
    paths:
      - web-frontend/node_modules/
    expire_in: 20 minutes
  timeout: 10m

# ---------------------------
# TypeScript type checking
# ---------------------------
typescript_check:
  stage: lint
  script:
    - cd web-frontend
    - npx tsc --noEmit
  needs:
    - job: install_dependencies
      artifacts: true
  timeout: 3m

# ---------------------------
# ESLint code quality check
# ---------------------------
eslint:
  stage: lint
  script:
    - cd web-frontend
    - npm run lint
  needs:
    - job: install_dependencies
      artifacts: true
  artifacts:
    reports:
      codequality: web-frontend/gl-codequality.json
    when: always
    expire_in: 3 days
  timeout: 3m

# ---------------------------
# Run Jest tests with coverage
# ---------------------------
test_jest:
  stage: test
  script:
    - cd web-frontend
    - npm run test -- --ci --watchAll=false --passWithNoTests
  needs:
    - job: install_dependencies
      artifacts: true
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: web-frontend/coverage/cobertura-coverage.xml
      junit: web-frontend/coverage/junit.xml
    paths:
      - web-frontend/coverage/
    when: always
    expire_in: 3 days
  timeout: 8m

# ---------------------------
# Build Docker image
# ---------------------------
docker_build:
  stage: docker-build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
  script:
    - cd web-frontend
    - docker build -t $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG .
    - docker build -t $DOCKER_IMAGE_NAME:latest .
    - docker save $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG > ../docker-image.tar
  artifacts:
    paths:
      - docker-image.tar
    expire_in: 1 day
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "pipeline-testing"'
      when: always
    - when: never
  timeout: 20m

# ---------------------------
# Trivy security scanning
# ---------------------------
trivy_scan:
  stage: security
  image: aquasec/trivy:latest
  script:
    - docker load < docker-image.tar
    - trivy image --format json --output trivy-report.json $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG
    - trivy image --format table $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG
    - |
      if trivy image --exit-code 1 --severity CRITICAL $DOCKER_IMAGE_NAME:$DOCKER_IMAGE_TAG; then
        echo "No CRITICAL vulnerabilities found"
      else
        echo "CRITICAL vulnerabilities found!"
        exit 1
      fi
  needs:
    - job: docker_build
      artifacts: true
  artifacts:
    reports:
      container_scanning: trivy-report.json
    paths:
      - trivy-report.json
    when: always
    expire_in: 3 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "dev"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "pipeline-testing"'
      when: always
    - when: never
  timeout: 10m

# ---------------------------
# Scan code base for secrets
# ---------------------------
scan_build_secrets:
  stage: security
  image: python:3.11-alpine
  script:
    - pip install detect-secrets
    - cd web-frontend
    - "detect-secrets scan --all-files . > ../detect_secrets_report.json || true"
    - cd ..
    - 'if [ -s detect_secrets_report.json ]; then echo "Secrets detected in source code!" && exit 1; fi'
  needs:
    - job: install_dependencies
      artifacts: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev")'
      when: always
    - when: never
  timeout: 3m

# ---------------------------
# Security audit
# ---------------------------
security_audit:
  stage: security
  script:
    - cd web-frontend
    - npm audit --audit-level=moderate
  needs:
    - job: install_dependencies
      artifacts: false
  allow_failure: true
  timeout: 5m

# ---------------------------
# Generate and deploy documentation to GitLab Pages
# ---------------------------
pages:
  stage: deploy
  script:
    - cd web-frontend
    - npm run docs
    - cd ..
    - mkdir public
    - cp -r web-frontend/docs/* public/
  needs:
    - install_dependencies
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_PIPELINE_SOURCE == "push"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - when: never
  timeout: 10m

# ---------------------------
# Clean up cache periodically
# ---------------------------
cleanup_cache:
  stage: install
  script:
    - echo "Cleaning up old cache files..."
    - find web-frontend/.npm -type f -mtime +7 -delete 2>/dev/null || true
    - find web-frontend/.next/cache -type f -mtime +7 -delete 2>/dev/null || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
    - when: never
