services:
  mock-api:
    build:
      context: ./web-frontend/mock_api
      dockerfile: Dockerfile
    container_name: mock-api
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web-app:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://mock-api:3001
      environment:
        - NEXT_PUBLIC_API_URL=http://mock-api:3001
        - INTERNAL_API_URL=http://mock-api:3001
    container_name: web-app
    ports:
      - "3000:3000"
    depends_on:
      mock-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:3000 && curl -f http://mock-api:3001/healthcheck || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  lighthouse:
    build:
      context: .
      dockerfile: Dockerfile.lighthouse
    container_name: lighthouse
    working_dir: /workspace/web-frontend
    depends_on:
      web-app:
        condition: service_healthy
    shm_size: "2gb"
    cap_add:
      - SYS_ADMIN
    environment:
      - LHCI_BUILD_CONTEXT__CURRENT_HASH=${CI_COMMIT_SHA:-local}
      - LHCI_BUILD_CONTEXT__COMMIT_TIME=${CI_COMMIT_TIMESTAMP:-}
      - LHCI_BUILD_CONTEXT__CURRENT_BRANCH=${CI_COMMIT_REF_NAME:-local}
      - LHCI_BUILD_CONTEXT__COMMIT_MESSAGE=${CI_COMMIT_MESSAGE:-}
    command: >
      sh -c "
      echo 'Running Lighthouse CI for mobile...' &&
      lhci collect --upload.outputDir=./lighthouse-reports/mobile &&
      lhci assert &&
      lhci upload --upload.outputDir=./lighthouse-reports/mobile &&
      echo 'Running Lighthouse CI for desktop...' &&
      lhci collect --settings.preset=desktop --upload.outputDir=./lighthouse-reports/desktop &&
      lhci assert &&
      lhci upload --upload.outputDir=./lighthouse-reports/desktop
      "
    profiles:
      - lighthouse
