services:
  mock-api:
    build:
      context: ./web-frontend/mock_api
      dockerfile: Dockerfile
    container_name: mock-api
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web-app:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: web-app
    ports:
      - "3000:3000"
    depends_on:
      mock-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http = require('http'); const req = http.request('http://localhost:3000', (res) => { process.exit(res.statusCode >= 200 && res.statusCode < 400 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.end();",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  lighthouse:
    build:
      context: .
      dockerfile: Dockerfile.lighthouse
    container_name: lighthouse
    working_dir: /workspace/web-frontend
    # Volume mount removed - use docker cp to extract reports in CI
    # For local dev: docker cp lighthouse:/workspace/web-frontend/lighthouse-reports ./web-frontend/
    depends_on:
      web-app:
        condition: service_healthy
    shm_size: "2gb"
    cap_add:
      - SYS_ADMIN
    environment:
      - LHCI_BUILD_CONTEXT__CURRENT_HASH=${CI_COMMIT_SHA:-local}
      - LHCI_BUILD_CONTEXT__COMMIT_TIME=${CI_COMMIT_TIMESTAMP:-}
      - LHCI_BUILD_CONTEXT__CURRENT_BRANCH=${CI_COMMIT_REF_NAME:-local}
      - LHCI_BUILD_CONTEXT__COMMIT_MESSAGE=${CI_COMMIT_MESSAGE:-}
    command: >
      sh -c "
      echo 'Running Lighthouse CI for mobile...' &&
      lhci collect &&
      lhci assert &&
      lhci upload &&
      echo 'Running Lighthouse CI for desktop...' &&
      lhci collect --settings.preset=desktop &&
      lhci assert &&
      lhci upload
      "
    profiles:
      - lighthouse
