services:
  mock-api:
    build:
      context: ./web-frontend/mock_api
      dockerfile: Dockerfile
    container_name: mock-api
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web-app:
    build:
      context: ./web-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: web-app
    ports:
      - "3000:3000"
    depends_on:
      mock-api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const http = require('http'); const req = http.request('http://localhost:3000', (res) => { process.exit(res.statusCode >= 200 && res.statusCode < 400 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.end();",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
