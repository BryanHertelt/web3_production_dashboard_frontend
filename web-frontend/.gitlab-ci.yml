# GitLab CI/CD Pipeline for Next.js Project
# Runs linting, type checking, tests, builds, and security audits
# Differentiates pipelines for dev vs main merges

image: node:20-alpine

stages:
  - install
  - lint
  - test
  - build
  - performance
  - security
  - deploy

variables:
  NODE_OPTIONS: "--max-old-space-size=4096"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  CYPRESS_CACHE_FOLDER: "$CI_PROJECT_DIR/cache/Cypress"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - .next/cache/
    - .npm/
  policy: pull-push

# ---------------------------
# Install dependencies
# ---------------------------
install_dependencies:
  stage: install
  script:
    - npm ci --cache .npm --prefer-offline
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
    policy: push
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      when: always
    - when: never

# ---------------------------
# TypeScript type checking
# ---------------------------
typescript_check:
  stage: lint
  script:
    - npx tsc --noEmit
  dependencies:
    - install_dependencies
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - "**/*.ts"
        - "**/*.tsx"
        - tsconfig.json
        - package*.json
      when: always
    - when: never

# ---------------------------
# ESLint code quality check
# ---------------------------
eslint:
  stage: lint
  script:
    - npm run lint
  dependencies:
    - install_dependencies
  artifacts:
    reports:
      codequality: gl-codequality.json
    when: always
    expire_in: 1 week
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.jsx"
        - eslint.config.*
        - package*.json
      when: always
    - when: never

# ---------------------------
# Run Jest tests with coverage
# ---------------------------
test_jest:
  stage: test
  script:
    - npm run test -- --ci --watchAll=false --passWithNoTests
  dependencies:
    - install_dependencies
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
      junit: coverage/junit.xml
    paths:
      - coverage/
    when: always
    expire_in: 1 week
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.js"
        - "**/*.jsx"
        - "**/__tests__/**/*"
        - "**/*.test.*"
        - "**/*.spec.*"
        - jest.config.*
        - package*.json
      when: always
    - when: never

# ---------------------------
# Build the Next.js application
# ---------------------------
build_app:
  stage: build
  script:
    - npm run build
  dependencies:
    - install_dependencies
  artifacts:
    paths:
      - .next/
      - out/
    expire_in: 1 week
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      when: always
    - when: never

# ---------------------------
# Security audit
# ---------------------------
security_audit:
  stage: security
  script:
    - npm audit --audit-level=moderate
  dependencies:
    - install_dependencies
  allow_failure: true
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - package*.json
      when: always
    - when: never

# ---------------------------
# Clean up cache periodically
# ---------------------------
cleanup_cache:
  stage: install
  script:
    - echo "Cleaning up old cache files..."
    - find .npm -type f -mtime +7 -delete 2>/dev/null || true
    - find .next/cache -type f -mtime +7 -delete 2>/dev/null || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: manual
    - when: never
